name: SM-T536-Buildon:  workflow_dispatch:jobs:  build:    runs-on: ubuntu-20.04    steps:      - name: 1. Cleanup        run: |          sudo rm -rf /usr/share/dotnet          sudo rm -rf /usr/local/lib/android      - name: 2. Setup        run: |          sudo apt-get update          sudo apt-get install -y bc build-essential zip curl libssl-dev libxml2-utils openjdk-8-jdk python3          mkdir -p ~/bin          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo          chmod a+x ~/bin/repo          echo "PATH=$PATH:$HOME/bin" >> $GITHUB_ENV      - name: 3. Sync        run: |          mkdir ~/lineage && cd ~/lineage          repo init -u https://github.com/LineageOS/android.git -b lineage-17.1 --depth=1          repo sync -c -j$(nproc) --force-sync --no-clone-bundle --no-tags      - name: 4. Clone        run: |          cd ~/lineage          git clone https://github.com/ssch71/android_device_samsung_gtanotexl-SM-T536-fixd device/samsung/gtanotexl --depth=1          git clone https://github.com/LineageOS/android_kernel_samsung_exynos7870 -b lineage-17.1 kernel/samsung/exynos7870 --depth=1          mkdir -p vendor/samsung          git clone https://github.com/TheMuppets/proprietary_vendor_samsung.git -b lineage-17.1 vendor/samsung --depth=1      - name: 5. Build        run: |          cd ~/lineage          export ALLOW_MISSING_DEPENDENCIES=true          . build/envsetup.sh          lunch lineage_gtanotexl-userdebug          mka bacon -j$(nproc)      - name: 6. Upload        uses: actions/upload-artifact@v3        with:          name: Lineage-17.1-SM-T536          path: ~/lineage/out/target/product/gtanotexl/*.zip?
